appId: com.playwrightstudio.app
productName: Playwright Studio

directories:
  output: dist
  buildResources: build

asar: true
asarUnpack:
  - "node_modules/playwright/**"
  - "node_modules/playwright-core/**"

files:
  - "out/**"
  - "package.json"

extraResources:
  - from: resources/ms-playwright
    to: ms-playwright
  - from: resources/a2-runner.cjs
    to: a2-runner.cjs

win:
  target:
    - target: portable
      arch:
        - x64
  artifactName: ${productName}-${version}-portable-${arch}.${ext}

portable:
  artifactName: ${productName}-${version}-portable-${arch}.${ext}
