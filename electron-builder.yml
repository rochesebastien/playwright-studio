appId: com.playwrightstudio.app
productName: Playwright Studio

directories:
  output: dist
  # Ressources de build. L'icône de l'app est auto-détectée ici : dépose
  # simplement build/icon.png (PNG carré ≥ 256×256) → electron-builder en fait
  # l'icône de l'exe Windows. Voir build/README.md. Aucune clé `icon:` explicite
  # n'est définie exprès : ainsi l'absence du fichier ne casse pas le build.
  buildResources: build

asar: true
asarUnpack:
  - "node_modules/playwright/**"
  - "node_modules/playwright-core/**"

files:
  - "out/**"
  - "package.json"

extraResources:
  - from: resources/ms-playwright
    to: ms-playwright
  - from: resources/a2-runner.cjs
    to: a2-runner.cjs

win:
  target:
    - target: portable
      arch:
        - x64
  artifactName: ${productName}-${version}-portable-${arch}.${ext}

portable:
  artifactName: ${productName}-${version}-portable-${arch}.${ext}
