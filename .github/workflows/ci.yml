name: CI

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  test:
    name: Tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          # Le binaire Electron n'est pas nécessaire pour les tests (les modules
          # main sont testés en isolant/mockant 'electron').
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
          # Les browsers Playwright sont installés séparément (étape cache ci-dessous).
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Typecheck
        run: npm run typecheck

      # Chemin unique des browsers, partagé par le cache et les étapes suivantes.
      - name: Resolve browsers path
        run: echo "PLAYWRIGHT_BROWSERS_PATH=$HOME/pw-browsers" >> "$GITHUB_ENV"

      # Cache des browsers Playwright, clé figée sur la version (chromium-1194).
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/pw-browsers
          key: playwright-1.56.1-${{ runner.os }}

      - name: Install Chromium (Playwright)
        # Idempotent : si le cache est restauré, l'install détecte la présence
        # de chromium-1194 et ne retélécharge rien. PLAYWRIGHT_BROWSERS_PATH est
        # hérité de l'étape "Resolve browsers path" (via GITHUB_ENV).
        run: npx playwright install chromium --no-shell

      - name: Run tests (unit + smoke) under xvfb
        run: xvfb-run -a npm test

  build-windows:
    name: Build portable (Windows)
    needs: test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # Ici Electron DOIT se télécharger (packaging) : pas de skip Electron.
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Prepare browsers (Chromium 1194 → resources/ms-playwright)
        run: npm run prepare-browsers

      - name: Build portable .exe
        run: npm run dist:win

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: playwright-studio-portable-win-x64
          path: dist/*.exe
          retention-days: 14
          if-no-files-found: error
